<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inscription - Pay My Buddy</title>
</head>
<body>

<header>
    <h1 >
        <a th:href="@{/login}">Pay My Buddy</a>
    </h1>
</header>

<main>
<form th:action="@{/register}" method="post">
    <div>
        <input type="text" id="username" name="username" placeholder="Username" maxlength="100" required>
    </div>

    <div>
        <input type="email" id="email" name="email" placeholder="Mail" maxlength="100" required>
    </div>

    <div>
        <input type="password" id="password" name="password" placeholder="Mot de passe" maxlength="255" required>
    </div>

    <div>
        <button type="submit">S'inscrire</button>
    </div>
</form>
</main>

</body>
</html>
