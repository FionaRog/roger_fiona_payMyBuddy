<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Transactions - Pay My Buddy</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
</head>

<header>
    <nav>
        <p class="accueil">
            <a th:href="@{/transactions}">Pay My Buddy</a>
        </p>
        <a class="element-nav en-cours" th:href="@{/transactions}">Transférer</a>
        <a class="element-nav" th:href="@{/profile}">Profil</a>
        <a class="element-nav" th:href="@{/friends}">Ajouter relation</a>
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="element-nav logout-button">Se déconnecter</button>
        </form>
    </nav>
</header>

<body>
<main>
    <p th:if="${param.logout}">Déconnecté.e</p>
    <p class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></p>
    <p class="alert alert-error" th:if="${errorMessage}" th:text="${errorMessage}"></p>


    <form class="creer-transaction" th:action="@{/transactions/add}" th:object="${transactionRequestDto}" method="post">
        <div>
            <select class="selecteur-relation" th:field="*{receiverEmail}" required>
                <option value="">Sélectionner une relation</option>
                <option th:each="friend : ${friends}" th:value="${friend.email}" th:text="${friend.username}"></option>
            </select>
        </div>
        <div>
             <input class="description-transaction" type="text"  th:field="*{description}" placeholder="Description" maxlength="100">
        </div>
         <div>
            <input class="montant-transaction" type="number" th:field="*{amount}" placeholder="0" step="0.01" min="0.01" required> </div>
        </div>
        <div>
             <button class="payer-button" type="submit">Payer</button>
        </div>
    </form>

    <div class="mes-transactions">
    <form th:action="@{/transactions}" method="get">
        <select class="filtre" name="filter">
            <option value="all" th:selected="${selectedFilter == 'all'}">Toutes</option>
            <option value="sent" th:selected="${selectedFilter == 'sent'}">Envoyées</option>
            <option value="received" th:selected="${selectedFilter == 'received'}">Reçues</option>
        </select>
        <button class="filtre-button" type="submit">Filtrer</button>
    </form>

    <table>
        <caption class="mes-transactions-titre" th:switch="${selectedFilter}">
            <span th:case=" 'sent' "> Mes transactions envoyées</span>
            <span th:case=" 'received' ">Mes transactions reçues</span>
            <span th:case=" 'all' "> Mes transactions</span>
        </caption>
        <thead>
        <tr>
            <th>Expéditeur</th>
            <th>Destinataire</th>
            <th>Description</th>
            <th>Montant</th>
            <th>Frais</th>
            <th>Date</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="transaction : ${transactions}">
            <td th:text="${transaction.senderUsername}"></td>
            <td th:text="${transaction.receiverUsername}"></td>
            <td th:text="${transaction.description}"></td>
            <td th:text="${#numbers.formatDecimal(transaction.amount, 1, 2)} + ' €'"></td>
            <td th:text="${#numbers.formatDecimal(transaction.fee, 1, 2)} + ' €'"></td>
            <td th:text="${#temporals.format(transaction.dateTransaction, 'dd/MM/yyyy HH:mm')}"></td>
        </tr>
        </tbody>
    </table>
    </div>
</main>
</body>
</html>
