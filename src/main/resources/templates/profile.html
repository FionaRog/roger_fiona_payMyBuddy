<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profil - Pay My Buddy</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
</head>

<header>
    <nav>
        <p class="accueil">
            <a th:href="@{/transactions}">Pay My Buddy</a>
        </p>
        <a class="element-nav" th:href="@{/transactions}">Transférer</a>
        <a class="element-nav en-cours" th:href="@{/profile}">Profil</a>
        <a class="element-nav" th:href="@{/friends}">Ajouter relation</a>
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="element-nav logout-button">Se déconnecter</button>
        </form>
    </nav>
</header>
<body>
<main>
    <p th:if="${param.logout}">Déconnecté.e</p>
    <p class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></p>
    <p class="alert alert-error" th:if="${errorMessage}" th:text="${errorMessage}"></p>

    <div class="profile-page">
    <section class="modif">
        <form th:action="@{/profile/username}" method="post">
            <div class="entree">
                <label class="label-profile" for="username">Username</label>
                <input class="modif-profil" type="text" id="username" name="username" th:value="${username}" required>

            <button class="modifier-button" type="submit">Modifier</button>
            </div>
        </form>
    </section>

    <section class="modif">
        <div class="entree">
            <label class="label-profile">Mail</label>
            <input class="modif-profil" type="email" name="email" th:value="${user.email}" readonly>
        </div>
    </section>

    <section class="modif">
        <div class="entree" th:if="${param.editPassword == null}">
            <label class="label-profile">Password</label>
            <input class="modif-profil" type="password" value="*******" readonly>

            <a class="modifier-button" th:href="@{/profile(editPassword=true)}">Modifier</a>
        </div>

        <div class="entree" th:if="${param.editPassword}">
            <form th:action="@{/profile/password}" th:object="${updatePasswordRequestDto}" method="post">
                 <div class="entree">
                    <label class="label-profile" for="currentPassword">Mot de passe actuel</label>
                    <input class="modif-profil" type="password" id="currentPassword" th:field="*{currentPassword}" placeholder="Mot de passe actuel" required/>
                </div>
                <div class="entree">
                    <label class="label-profile" for="newPassword">Nouveau mot de passe</label>
                    <input class="modif-profil" type="password" id="newPassword" th:field="*{newPassword}" placeholder="Nouveau mot de passe" required/>
                </div>
                <div class="entree">
                    <label class="label-profile" for="confirmPassword">Confirmer mot de passe</label>
                    <input class="modif-profil" type="password" id="confirmPassword" th:field="*{confirmPassword}" placeholder="Confirmer mot de passe" required/>
                </div>
                <button class="modifier-button" type="submit">Valider</button>
            </form>
        </div>
    </section>

    <section class="solde-actuel">
        <div class="entree">
            <label class="label-profile" for="balance">Solde actuel :</label>
            <p id="balance" th:text="${#numbers.formatDecimal(user.balance, 1, 2)} +' €'"></p>
        </div>
    </section>
    <section class="modif">
        <form th:action="@{/profile/deposit}" method="post">
            <div class="entree">
                <label class="label-profile" for="depositAmount">Déposer de l'argent</label>
                <input class="modif-profil" type="number" id="depositAmount" name="amount" step="0.01" min="0.01" placeholder="0.00" required>
                <button class="modifier-button" type="submit">Déposer</button>
            </div>
        </form>
    </section>
    <section class="modif">
        <form th:action="@{/profile/withdraw}" method="post">
            <div class="entree">
                <label class="label-profile" for="withdrawAmount">Retirer de l'argent</label>
                <input class="modif-profil" type="number" id="withdrawAmount" name="amount" step="0.01" min="0.01" placeholder="0.00" required>
                <button class="modifier-button" type="submit">Retirer</button>
            </div>
        </form>
      </section>
</main>

</body>
</html>
