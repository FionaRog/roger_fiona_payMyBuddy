<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>

<header>
    <h1>
        <a th:href="@{/transactions}">Pay My Buddy</a>
    </h1>
    <nav>
        <a th:href="@{/transactions}">Transférer</a>
        <a th:href="@{/profile}">Profil</a>
        <a th:href="@{/friends}">Ajouter relation</a>

        <form th:action="@{/logout}" method="post">
            <button type="submit">Logout</button>
        </form>
    </nav>
</header>

<body>
<main>
    <p th:if="${param.logout}">Déconnecté.e</p>
    <p th:if="${successMessage}" th:text="${successMessage}"></p>
    <p th:if="${errorMessage}" th:text="${errorMessage}"></p>


    <form th:action="@{/friends/add}" method="post">
    <div>
        <label for="email">Chercher une relation</label>
        <input type="email" placeholder="Saisir une adresse mail" name="email" id="email">
    </div>

    <div>
        <button type="submit">Ajouter</button>
    </div>

    </form>
</main>
</body>
</html>
