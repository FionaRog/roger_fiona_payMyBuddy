<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Relations - Pay My Buddy</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
</head>

<body>
<header>
    <nav>
        <p class="accueil">
            <a th:href="@{/transactions}">Pay My Buddy</a>
        </p>
        <a class="element-nav" th:href="@{/transactions}">Transférer</a>
        <a class="element-nav" th:href="@{/profile}">Profil</a>
        <a class="element-nav en-cours" th:href="@{/friends}">Ajouter relation</a>
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="element-nav logout-button">Se déconnecter</button>
        </form>
    </nav>
</header>

<main>
    <p th:if="${param.logout}">Déconnecté.e</p>
    <p class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></p>
    <p class="alert alert-error" th:if="${errorMessage}" th:text="${errorMessage}"></p>

    <h1 class="invisible">Mes relations</h1>

    <div class="relation-page">
    <form th:action="@{/friends/add}" method="post">
        <div class="form-relation">
            <div class="chercher-relation">
                <label class="titre-relation" for="email">Chercher une relation</label>
                <input class="mail-relation" type="email" placeholder="Saisir une adresse mail" name="email" id="email">
            </div>
           <button class="relation-button" type="submit">Ajouter</button>
       </div>

    </form>
    </div>
</main>
</body>
</html>
